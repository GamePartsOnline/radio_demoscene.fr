<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - DEMOSCENE.FR</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --accent: #ff0055; --bg: #0a0a0c; --panel: #141418; }
        body { background: var(--bg); color: #c0c0c0; font-family: 'Share Tech Mono', monospace; padding: 50px; }
        .admin-card { background: var(--panel); border: 1px solid #222; padding: 25px; border-radius: 4px; }
        .track-row { border-bottom: 1px solid #222; padding: 10px 0; display: flex; align-items: center; justify-content: space-between; }
        .track-row:hover { background: #1a1a20; }
        .track-row.new-track { 
            border-left: 4px solid #00e5ff; 
            background: rgba(0, 229, 255, 0.1); 
        }
        .new-badge { 
            background: #000; 
            color: #00e5ff; 
            border: 1px solid #00e5ff;
            font-size: 0.7rem; 
            padding: 1px 6px; 
            margin-left: 10px; 
            font-weight: bold;
            vertical-align: middle; 
        }
        .btn-delete { color: #ff0055; border: 1px solid #ff0055; background: none; padding: 2px 10px; cursor: pointer; }
        .btn-delete:hover { background: #ff0055; color: #fff; }
        .btn-edit { color: #00e5ff; border: 1px solid #00e5ff; background: none; padding: 2px 10px; cursor: pointer; margin-right: 5px; }
        .btn-edit:hover { background: #00e5ff; color: #000; }
        .btn-approve { color: #39ff14; border: 1px solid #39ff14; background: none; padding: 2px 10px; cursor: pointer; margin-right: 5px; }
        .btn-approve:hover { background: #39ff14; color: #000; }
        .btn-disapprove { color: #ffaa00; border: 1px solid #ffaa00; background: none; padding: 2px 10px; cursor: pointer; margin-right: 5px; }
        .btn-disapprove:hover { background: #ffaa00; color: #000; }
        .status-badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 2px; margin-left: 5px; }
        .status-pending { background: #ffaa00; color: #000; }
        .status-approved { background: #39ff14; color: #000; }
        .nav-link { color: #00e5ff; text-decoration: none; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <a href="/" class="nav-link"><i class="fas fa-arrow-left"></i> Retour à la Radio</a>
    
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="admin-card mb-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-uppercase fw-bold m-0" style="color: var(--accent)">Gestion de la Bibliothèque</h2>
                    <button class="btn btn-sm btn-outline-info" onclick="syncLibrary()">SYNC AUDIO</button>
                </div>
                <div class="mb-3">
                    <input type="text" id="searchTracks" class="form-control form-control-sm bg-dark border-secondary text-white" placeholder="Rechercher une musique ou un auteur..." oninput="filterTracks()">
                </div>
                <div id="track-list" style="max-height: 400px; overflow-y: auto;">
                    <!-- Liste des musiques -->
                </div>
            </div>

            <div class="admin-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-uppercase fw-bold m-0" style="color: #00e5ff">Modération Galerie Images</h2>
                    <button class="btn btn-sm btn-outline-info" onclick="syncGraphics()">SYNC IMAGES</button>
                </div>
                <div class="mb-3">
                    <input type="text" id="searchGraphics" class="form-control form-control-sm bg-dark border-secondary text-white" placeholder="Rechercher une image..." oninput="filterGraphics()">
                </div>
                <div id="graphics-list" style="max-height: 400px; overflow-y: auto;">
                    <!-- Liste des images -->
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="admin-card mb-4">
                <h2 class="text-uppercase fw-bold mb-4" style="color: #ffaa00">Gestion des Podcasts</h2>
                <form id="podcastUploadForm" class="mb-4">
                    <input type="text" id="podTitle" class="form-control form-control-sm bg-dark border-secondary text-white mb-2" placeholder="Titre du Podcast" required>
                    <input type="text" id="podAuthor" class="form-control form-control-sm bg-dark border-secondary text-white mb-2" placeholder="Auteur/Producteur">
                    <textarea id="podDesc" class="form-control form-control-sm bg-dark border-secondary text-white mb-2" placeholder="Description courte..."></textarea>
                    <input type="file" id="podFile" class="form-control form-control-sm bg-dark border-secondary text-white mb-2" accept=".mp3,.wav,.m4a" required>
                    <button type="submit" class="btn btn-warning btn-sm w-100 fw-bold">UPLOADER PODCAST</button>
                </form>
                <div id="podcast-list" style="max-height: 400px; overflow-y: auto;">
                    <!-- Liste des podcasts -->
                </div>
            </div>

            <div class="admin-card h-100">
                <h2 class="text-uppercase fw-bold mb-4" style="color: #ff00ff">Messages Défilants</h2>
                <div class="mb-4">
                    <input type="text" id="newMessage" class="form-control bg-dark border-secondary text-white mb-2" placeholder="Saisir un nouveau message...">
                    <div class="d-flex align-items-center gap-2">
                        <label class="small opacity-50">Couleur:</label>
                        <input type="color" id="msgColor" value="#ff00ff" class="form-control form-control-color bg-transparent border-0 p-0" style="width: 30px; height: 30px;">
                        <button class="btn btn-info flex-grow-1" onclick="addMessage()">AJOUTER LE MESSAGE</button>
                    </div>
                </div>
                <div id="message-list" style="max-height: 650px; overflow-y: auto;">
                    <!-- Liste des messages -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let adminPass = sessionStorage.getItem('adminPass');

        async function checkAuth() {
            if (!adminPass) {
                adminPass = prompt("Veuillez saisir le mot de passe administrateur :");
                if (!adminPass) {
                    window.location.href = "/";
                    return;
                }
                sessionStorage.setItem('adminPass', adminPass);
            }

            const res = await fetch('/api/admin/verify', {
                headers: { 'Authorization': adminPass }
            });

            if (!res.ok) {
                alert("Mot de passe incorrect.");
                sessionStorage.removeItem('adminPass');
                adminPass = null;
                checkAuth();
            } else {
                loadTracks();
                loadGraphics();
                loadMessages();
                loadPodcasts();
            }
        }

        // --- GESTION DES PODCASTS ---

        async function loadPodcasts() {
            try {
                const res = await fetch('/api/admin/podcasts', { headers: { 'Authorization': adminPass } });
                const pods = await res.json();
                const container = document.getElementById('podcast-list');
                container.innerHTML = pods.map(p => {
                    const isApproved = p.status === 'approved';
                    return `
                    <div class="track-row">
                        <div class="flex-grow-1">
                            <span class="fw-bold text-white small">${p.title}</span>
                            <span class="status-badge ${isApproved ? 'status-approved' : 'status-pending'}">${p.status.toUpperCase()}</span>
                            <br>
                            <small class="opacity-50" style="font-size: 0.65rem;">BY ${p.author} | FILE: ${p.filename}</small>
                        </div>
                        <div class="d-flex">
                            ${isApproved ? 
                                `<button class="btn-disapprove" onclick="disapprovePodcast(${p.id})"><i class="fas fa-times"></i></button>` : 
                                `<button class="btn-approve" onclick="approvePodcast(${p.id})"><i class="fas fa-check"></i></button>`
                            }
                            <button class="btn-delete" onclick="deletePodcast(${p.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;}).join('');
            } catch (e) { console.error(e); }
        }

        async function approvePodcast(id) {
            await fetch(`/api/admin/podcasts/${id}/approve`, { method: 'PUT', headers: { 'Authorization': adminPass } });
            loadPodcasts();
        }

        async function disapprovePodcast(id) {
            await fetch(`/api/admin/podcasts/${id}/disapprove`, { method: 'PUT', headers: { 'Authorization': adminPass } });
            loadPodcasts();
        }

        async function deletePodcast(id) {
            if (!confirm("Supprimer ce podcast ?")) return;
            await fetch(`/api/admin/podcasts/${id}`, { method: 'DELETE', headers: { 'Authorization': adminPass } });
            loadPodcasts();
        }

        document.getElementById('podcastUploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('podcast', document.getElementById('podFile').files[0]);
            fd.append('title', document.getElementById('podTitle').value);
            fd.append('author', document.getElementById('podAuthor').value);
            fd.append('description', document.getElementById('podDesc').value);

            const res = await fetch('/api/podcasts/upload', { method: 'POST', body: fd });
            const data = await res.json();
            alert(data.message || data.error);
            if (res.ok) {
                e.target.reset();
                loadPodcasts();
            }
        };

        // --- GESTION DES PISTES ---

        async function loadTracks() {
            try {
                const res = await fetch('/api/admin/tracks', { headers: { 'Authorization': adminPass } });
                const tracks = await res.json();
                const container = document.getElementById('track-list');
                
                const now = new Date();
                const oneDayInMs = 24 * 60 * 60 * 1000;

                container.innerHTML = tracks.map(t => {
                    const createdDate = new Date(t.created_at + ' UTC');
                    const isNew = (now - createdDate) < oneDayInMs;
                    const isApproved = t.status === 'approved';
                    
                    return `
                    <div class="track-row ${isNew ? 'new-track' : ''}">
                        <div class="flex-grow-1">
                            <span class="fw-bold text-white small">${t.original_name}</span>
                            <span class="status-badge ${isApproved ? 'status-approved' : 'status-pending'}">${t.status.toUpperCase()}</span>
                            <br>
                            <small class="opacity-50" style="font-size: 0.65rem;">BY ${t.author} | ${createdDate.toLocaleDateString()}</small>
                        </div>
                        <div class="d-flex">
                            ${isApproved ? 
                                `<button class="btn-disapprove" onclick="disapproveTrack(${t.id})" title="Désapprouver"><i class="fas fa-times"></i></button>` : 
                                `<button class="btn-approve" onclick="approveTrack(${t.id})" title="Approuver"><i class="fas fa-check"></i></button>`
                            }
                            <button class="btn-edit" onclick="editTrack(${t.id}, '${t.original_name.replace(/'/g, "\\'")}', '${t.author.replace(/'/g, "\\'")}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-delete" onclick="deleteTrack(${t.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;}).join('');
            } catch (err) {
                console.error("Erreur chargement tracks:", err);
            }
        }

        async function approveTrack(id) {
            await fetch(`/api/admin/tracks/${id}/approve`, { method: 'PUT', headers: { 'Authorization': adminPass } });
            loadTracks();
        }

        async function disapproveTrack(id) {
            await fetch(`/api/admin/tracks/${id}/disapprove`, { method: 'PUT', headers: { 'Authorization': adminPass } });
            loadTracks();
        }

        async function editTrack(id, oldName, oldAuthor) {
            const newName = prompt("Nouveau nom de la piste :", oldName);
            if (newName === null) return;
            const newAuthor = prompt("Auteur :", oldAuthor);
            if (newAuthor === null) return;
            const res = await fetch(`/api/tracks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': adminPass },
                body: JSON.stringify({ original_name: newName, author: newAuthor })
            });
            if (res.ok) loadTracks();
        }

        async function deleteTrack(id) {
            if (!confirm("Voulez-vous vraiment supprimer cette piste ?")) return;
            await fetch(`/api/tracks/${id}`, { method: 'DELETE', headers: { 'Authorization': adminPass } });
            loadTracks();
        }

        async function syncLibrary() {
            if (!confirm("Synchroniser les fichiers audio ?")) return;
            const res = await fetch('/api/admin/sync', { method: 'POST', headers: { 'Authorization': adminPass } });
            const data = await res.json();
            alert(`Sync terminée ! Ajoutés: ${data.added}`);
            loadTracks();
        }

        // --- GESTION DES GRAPHISMES ---

        async function loadGraphics() {
            try {
                const res = await fetch('/api/admin/graphics', { headers: { 'Authorization': adminPass } });
                const graphics = await res.json();
                const container = document.getElementById('graphics-list');
                
                container.innerHTML = graphics.map(g => {
                    const isApproved = g.status === 'approved';
                    return `
                    <div class="track-row">
                        <div class="d-flex align-items-center flex-grow-1">
                            <img src="/graphics/${g.filename}" style="width: 40px; height: 40px; object-fit: cover; margin-right: 10px;">
                            <div>
                                <small class="text-white d-block text-truncate" style="max-width: 150px;">${g.filename}</small>
                                <span class="status-badge ${isApproved ? 'status-approved' : 'status-pending'}">${g.status.toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="d-flex">
                            ${isApproved ? 
                                `<button class="btn-disapprove" onclick="disapproveGraphic(${g.id})" title="Désapprouver"><i class="fas fa-times"></i></button>` : 
                                `<button class="btn-approve" onclick="approveGraphic(${g.id})" title="Approuver"><i class="fas fa-check"></i></button>`
                            }
                            <button class="btn-delete" onclick="deleteGraphic(${g.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;}).join('');
            } catch (err) {
                console.error("Erreur chargement graphics:", err);
            }
        }

        async function approveGraphic(id) {
            await fetch(`/api/admin/graphics/${id}/approve`, { method: 'PUT', headers: { 'Authorization': adminPass } });
            loadGraphics();
        }

        async function disapproveGraphic(id) {
            await fetch(`/api/admin/graphics/${id}/disapprove`, { method: 'PUT', headers: { 'Authorization': adminPass } });
            loadGraphics();
        }

        async function deleteGraphic(id) {
            if (!confirm("Supprimer cette image ?")) return;
            await fetch(`/api/admin/graphics/${id}`, { method: 'DELETE', headers: { 'Authorization': adminPass } });
            loadGraphics();
        }

        async function syncGraphics() {
            if (!confirm("Synchroniser les fichiers images ?")) return;
            const res = await fetch('/api/admin/graphics/sync', { method: 'POST', headers: { 'Authorization': adminPass } });
            const data = await res.json();
            alert(`Sync terminée ! Ajoutées: ${data.added}`);
            loadGraphics();
        }

        // --- FONCTIONS DE RECHERCHE ---

        function filterTracks() {
            const query = document.getElementById('searchTracks').value.toLowerCase();
            const rows = document.querySelectorAll('#track-list .track-row');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        function filterGraphics() {
            const query = document.getElementById('searchGraphics').value.toLowerCase();
            const rows = document.querySelectorAll('#graphics-list .track-row');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        // --- GESTION DES MESSAGES ---

        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                const messages = await res.json();
                const container = document.getElementById('message-list');
                container.innerHTML = messages.map(m => `
                    <div class="track-row">
                        <div style="color: ${m.color || '#ff00ff'}">${m.text}</div>
                        <button class="btn-delete" onclick="deleteMessage(${m.id})"><i class="fas fa-trash"></i></button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Erreur chargement messages:", err);
            }
        }

        async function addMessage() {
            const text = document.getElementById('newMessage').value;
            const color = document.getElementById('msgColor').value;
            if (!text) return;
            const res = await fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': adminPass },
                body: JSON.stringify({ text, color })
            });
            if (res.ok) {
                document.getElementById('newMessage').value = "";
                loadMessages();
            }
        }

        async function deleteMessage(id) {
            if (!confirm("Supprimer ce message ?")) return;
            await fetch(`/api/messages/${id}`, { method: 'DELETE', headers: { 'Authorization': adminPass } });
            loadMessages();
        }

        checkAuth();
    </script>
</body>
</html>
